name: Build APK

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.0
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          EXPO_PUBLIC_OAUTH_PORTAL_URL=${{ secrets.EXPO_PUBLIC_OAUTH_PORTAL_URL }}
          EXPO_PUBLIC_OAUTH_SERVER_URL=${{ secrets.EXPO_PUBLIC_OAUTH_SERVER_URL }}
          EXPO_PUBLIC_APP_ID=${{ secrets.EXPO_PUBLIC_APP_ID }}
          EXPO_PUBLIC_OWNER_OPEN_ID=${{ secrets.EXPO_PUBLIC_OWNER_OPEN_ID }}
          EXPO_PUBLIC_OWNER_NAME=${{ secrets.EXPO_PUBLIC_OWNER_NAME }}
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          NODE_ENV=production
          EOF
      
      - name: Setup EAS
        run: npm install -g eas-cli
      
      - name: Build APK with EAS
        env:
          EAS_NO_VCS_DETECTION: true
        run: eas build --platform android --non-interactive --wait
      
      - name: Download APK
        run: |
          mkdir -p apk-output
          # O arquivo APK será salvo automaticamente
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v3
        with:
          name: vibeon-app-apk
          path: |
            **/*.apk
          retention-days: 30
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            APK build completed successfully!
            
            Download the APK from the artifacts section or from the release assets.
          draft: false
          prerelease: false
